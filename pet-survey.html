<!DOCTYPE html><html lang="zh-Hant"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0"><title>開心寵物療癒需求調查</title><style>*{box-sizing:border-box}body{margin:0;font-family:"Noto Sans TC","Microsoft JhengHei",sans-serif;background:linear-gradient(180deg,#fffaf6,#f9ece8);color:#4b3932}.wrap{max-width:760px;margin:auto;padding:28px 16px 60px}.card{background:#fff;border:1px solid #efd7cf;border-radius:24px;padding:24px;box-shadow:0 10px 28px rgba(117,75,65,.08)}h1{text-align:center;color:#9f4f58}.sub{text-align:center;color:#795f56;line-height:1.8}label{display:block;font-weight:700;margin:18px 0 8px}input,select,textarea{width:100%;padding:13px;border:1px solid #dcc7c0;border-radius:12px;font:inherit}textarea{min-height:110px}.grid{display:grid;grid-template-columns:1fr 1fr;gap:14px}.checks{display:grid;gap:9px}.checks label{font-weight:400;margin:0;display:flex;gap:8px}.checks input{width:auto}.notice{background:#fff5f1;padding:14px;border-radius:14px;line-height:1.7;margin-top:20px}button{width:100%;border:0;border-radius:999px;background:#b85c65;color:white;padding:15px;font-size:17px;font-weight:700;margin-top:22px}.msg{text-align:center;margin-top:14px;font-weight:700}.hp{position:absolute;left:-9999px}@media(max-width:620px){.grid{grid-template-columns:1fr}}</style></head><body><div class="wrap"><div class="card"><h1>🐾 開心寵物療癒需求調查</h1><div class="sub">填寫約 3–5 分鐘。資料只用於了解毛孩狀況、安排療癒與後續回覆，不會公開分享。</div><form id="petForm"><label>照顧者姓名 *</label><input name="guardianName" required><div class="grid"><div><label>Email *</label><input type="email" name="email" required></div><div><label>電話／WhatsApp</label><input name="phone"></div></div><div class="grid"><div><label>毛孩名字 *</label><input name="petName" required></div><div><label>毛孩種類 *</label><select name="petType" required><option value="">請選擇</option><option>狗狗</option><option>貓咪</option><option>兔子</option><option>鳥類</option><option>其他</option></select></div></div><div class="grid"><div><label>年齡</label><input name="petAge"></div><div><label>性別</label><select name="petGender"><option value="">請選擇</option><option>雄性</option><option>雌性</option><option>不確定</option></select></div></div><label>目前主要狀況 *</label><div class="checks"><label><input type="checkbox" name="issues" value="情緒焦慮或害怕">情緒焦慮、緊張或害怕</label><label><input type="checkbox" name="issues" value="行為改變">吠叫、躲藏、防衛、黏人或其他行為改變</label><label><input type="checkbox" name="issues" value="環境改變">搬家、寄宿、家庭成員或環境改變</label><label><input type="checkbox" name="issues" value="身體不適">身體不適、疼痛、手術或治療期間</label><label><input type="checkbox" name="issues" value="年老陪伴">年老毛孩的陪伴與支持</label><label><input type="checkbox" name="issues" value="失去同伴">失去毛孩同伴或家人後的悲傷</label><label><input type="checkbox" name="issues" value="其他">其他</label></div><label>請描述最近的狀況、何時開始及發生頻率 *</label><textarea name="situation" required></textarea><label>目前是否已看獸醫？診斷、藥物或治療情況</label><textarea name="vetInfo"></textarea><label>你最希望毛孩獲得什麼支持？ *</label><textarea name="supportNeeded" required></textarea><label>希望選擇的方案</label><select name="plan"><option>尚未決定</option><option>30 分鐘｜USD 99</option><option>60 分鐘｜USD 198</option></select><label>方便聯絡的方式</label><select name="contactMethod"><option>Email</option><option>WhatsApp</option><option>LINE</option></select><label class="hp">請不要填寫<input name="website"></label><div class="notice">⚠️ 寵物能量療癒屬於輔助性的身心支持，不能替代獸醫診斷、藥物、治療或緊急醫療。如毛孩有急症，請立即聯絡獸醫。</div><label><input type="checkbox" name="consent" value="同意" required style="width:auto"> 我已閱讀並同意以上說明，並確認提供的資料真實完整。</label><button type="submit" id="submitBtn">送出寵物療癒需求調查</button><div id="msg" class="msg"></div></form></div></div><script>const SCRIPT_URL="https://script.google.com/macros/s/AKfycbyKrPzhzo981k4cIXMEwPCjRQ9z1h5U40hcv4w9G7TKIRaUYvDtXHWldXbjufLFylbH/exec";document.getElementById("petForm").addEventListener("submit",async(e)=>{e.preventDefault();const b=document.getElementById("submitBtn"),m=document.getElementById("msg");b.disabled=true;b.textContent="送出中…";const f=new FormData(e.target),issues=[...document.querySelectorAll('input[name="issues"]:checked')].map(x=>x.value).join("、"),data=Object.fromEntries(f.entries());data.issues=issues;try{const r=await fetch(SCRIPT_URL,{method:"POST",body:JSON.stringify(data)}),j=await r.json();if(!j.ok)throw new Error();m.style.color="#47845d";m.textContent="已收到資料，謝謝你為毛孩填寫。";e.target.reset()}catch(err){m.style.color="#b33";m.textContent="暫時無法送出，請稍後再試。"}finally{b.disabled=false;b.textContent="送出寵物療癒需求調查"}});</script></body></html>
